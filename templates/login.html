<!doctype html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login | MonfreTrack</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='app.css') }}">
</head>
<body class="login-page">
    <main class="login-shell">
        <section class="login-panel">
            <img class="login-logo" src="{{ url_for('logo') }}" alt="MonfreTrack">
            <div>
                <p class="eyebrow">Central MonfreTrack</p>
                <h1>Acesso operacional</h1>
            </div>

            {% if erro %}
            <div class="login-error">{{ erro }}</div>
            {% endif %}

            <form method="post" class="login-form">
                <label>
                    Usuário
                    <input name="usuario" autocomplete="username" autofocus>
                </label>
                <label>
                    Senha
                    <input name="senha" type="password" autocomplete="current-password">
                </label>
                <button class="primary-button" type="submit">Entrar</button>
            </form>
        </section>
    </main>
</body>
</html>
